services:
  postgres:
    image: postgres:16
    container_name: openopportunity-postgres
    environment:
      POSTGRES_DB: openopportunity
      POSTGRES_USER: openopportunity
      POSTGRES_PASSWORD: openopportunity
    ports:
      - '5432:5432'
    volumes:
      - openopportunity-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U openopportunity']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  openopportunity-postgres-data:
