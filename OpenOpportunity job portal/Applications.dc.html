<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: 'Inter', Helvetica, Arial, sans-serif; background: #F7F8FA; }
    a { color: #2451D6; }
    a:hover { color: #1E45BD; }
  </style>
</helmet>

<dc-import name="Header" variant="candidate" active-item="Dashboard" hint-size="100%,68px"></dc-import>

<div style="max-width:1000px;margin:0 auto;padding:28px 24px 64px;">
  <h1 style="font-size:20px;font-weight:800;color:#14181F;margin:0 0 4px;">My applications</h1>
  <p style="font-size:14px;color:#5B6472;margin:0 0 20px;">Track every job, partnership, and community application in one place.</p>

  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
    <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
      <button style="border:1px solid {{ t.border }};background:{{ t.bg }};color:{{ t.color }};border-radius:999px;padding:8px 16px;font-size:13.5px;font-weight:600;cursor:pointer;">{{ t.label }}</button>
    </sc-for>
  </div>

  <div style="display:flex;flex-direction:column;gap:12px;">
    <sc-for list="{{ applications }}" as="a" hint-placeholder-count="6">
      <div style="background:#FFFFFF;border:1px solid #E2E5EA;border-radius:14px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;">
        <div style="display:flex;gap:14px;align-items:center;min-width:0;">
          <div style="width:42px;height:42px;border-radius:10px;background:{{ a.iconBg }};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{{ a.iconColor }}" stroke-width="2"><path d="{{ a.icon }}"/></svg>
          </div>
          <div style="min-width:0;">
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <span style="font-size:14.5px;font-weight:700;color:#14181F;">{{ a.title }}</span>
              <span style="font-size:11px;font-weight:700;color:{{ a.iconColor }};background:{{ a.tagBg }};border-radius:999px;padding:2px 9px;">{{ a.typeLabel }}</span>
            </div>
            <div style="font-size:13px;color:#5B6472;margin-top:2px;">{{ a.org }} · Applied {{ a.applied }}</div>
          </div>
        </div>
        <span style="font-size:12.5px;font-weight:700;color:{{ a.statusColor }};background:{{ a.statusBg }};border-radius:999px;padding:6px 14px;white-space:nowrap;">{{ a.status }}</span>
      </div>
    </sc-for>
  </div>
</div>

<dc-import name="Footer" hint-size="100%,360px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'All (9)', border: '#14181F', bg: '#14181F', color: '#FFFFFF' },
        { label: 'Jobs (5)', border: '#E2E5EA', bg: '#FFFFFF', color: '#3A414D' },
        { label: 'Partnerships (3)', border: '#E2E5EA', bg: '#FFFFFF', color: '#3A414D' },
        { label: 'Community (1)', border: '#E2E5EA', bg: '#FFFFFF', color: '#3A414D' },
      ],
      applications: [
        { title: 'Senior Frontend Developer', org: 'Nimbus Cloud', applied: '3 days ago', status: 'Interview scheduled', statusColor: '#0F8A6B', statusBg: '#E7F7F1', typeLabel: 'Job', iconBg: '#EAF0FE', iconColor: '#2451D6', tagBg: '#EAF0FE', icon: 'M3 7h18v13H3zM3 7l9-4 9 4' },
        { title: 'Frontend Partner — Product MVP', org: 'Vertex Robotics', applied: '5 days ago', status: 'Under review', statusColor: '#B45309', statusBg: '#FFF1DC', typeLabel: 'Partnership', iconBg: '#FFF1DC', iconColor: '#C2760C', tagBg: '#FFF6E9', icon: 'M12 2l3 6 6 1-4.5 4.5L17.5 20 12 17l-5.5 3 1-6.5L3 9l6-1z' },
        { title: 'React Developer', org: 'Bharat Retail Tech', applied: '1 week ago', status: 'Applied', statusColor: '#5B6472', statusBg: '#F0F2F5', typeLabel: 'Job', iconBg: '#EAF0FE', iconColor: '#2451D6', tagBg: '#EAF0FE', icon: 'M3 7h18v13H3zM3 7l9-4 9 4' },
        { title: 'Peer Mentor Circle — Tech Careers', org: 'OpenOpportunity Community', applied: '1 week ago', status: 'Invited to session', statusColor: '#0F8A6B', statusBg: '#E7F7F1', typeLabel: 'Community', iconBg: '#E1F5EE', iconColor: '#0F8A6B', tagBg: '#E7F7F1', icon: 'M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6M9 8a3 3 0 1 0 0 6' },
        { title: 'UI Engineer', org: 'Skyline Systems', applied: '2 weeks ago', status: 'Not selected', statusColor: '#DC2626', statusBg: '#FDECEC', typeLabel: 'Job', iconBg: '#EAF0FE', iconColor: '#2451D6', tagBg: '#EAF0FE', icon: 'M3 7h18v13H3zM3 7l9-4 9 4' },
        { title: 'Growth & Lifecycle Partner', org: 'Lumen Health', applied: '3 weeks ago', status: 'Seminar invite sent', statusColor: '#0F8A6B', statusBg: '#E7F7F1', typeLabel: 'Partnership', iconBg: '#FFF1DC', iconColor: '#C2760C', tagBg: '#FFF6E9', icon: 'M12 2l3 6 6 1-4.5 4.5L17.5 20 12 17l-5.5 3 1-6.5L3 9l6-1z' },
      ],
    };
  }
}

</script>
</body>
</html>
