<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: 'Inter', Helvetica, Arial, sans-serif; background: #F7F8FA; }
    a { color: #2451D6; }
    a:hover { color: #1E45BD; }
  </style>
</helmet>

<dc-import name="Header" variant="guest" hint-size="100%,68px"></dc-import>

<div style="min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <div style="background:#FFFFFF;border:1px solid #E2E5EA;border-radius:16px;padding:36px;max-width:420px;width:100%;">
    <div style="text-align:center;margin-bottom:24px;">
      <span style="display:inline-block;font-size:12.5px;font-weight:700;color:#2451D6;background:#EAF0FE;border-radius:999px;padding:5px 12px;margin-bottom:16px;">For Employers</span>
      <h1 style="font-size:22px;font-weight:800;color:#14181F;margin:0 0 6px;">Company login</h1>
      <p style="font-size:14px;color:#5B6472;margin:0;">Post jobs, offer partnerships, and search candidates.</p>
    </div>

    <div style="display:flex;background:#F0F2F5;border-radius:9px;padding:4px;margin-bottom:22px;">
      <sc-for list="{{ modes }}" as="m" hint-placeholder-count="2">
        <button onClick="{{ () => setMode(m.key) }}" style="flex:1;border:none;border-radius:7px;padding:9px;font-size:13.5px;font-weight:700;cursor:pointer;background:{{ m.bg }};color:{{ m.color }};">{{ m.label }}</button>
      </sc-for>
    </div>

    <label style="display:block;font-size:13px;font-weight:700;color:#14181F;margin-bottom:6px;">Work email</label>
    <input type="email" placeholder="you@company.com" style="width:100%;border:1px solid #E2E5EA;border-radius:9px;padding:11px 12px;font-size:14px;font-family:inherit;box-sizing:border-box;margin-bottom:16px;" />

    <sc-if value="{{ isPassword }}" hint-placeholder-val="{{ true }}">
      <label style="display:block;font-size:13px;font-weight:700;color:#14181F;margin-bottom:6px;">Password</label>
      <input type="password" placeholder="••••••••" style="width:100%;border:1px solid #E2E5EA;border-radius:9px;padding:11px 12px;font-size:14px;font-family:inherit;box-sizing:border-box;margin-bottom:8px;" />
      <div style="text-align:right;margin-bottom:18px;"><a href="#forgot" style="font-size:13px;font-weight:600;text-decoration:none;">Forgot password?</a></div>
    </sc-if>
    <sc-if value="{{ isOtp }}" hint-placeholder-val="{{ false }}">
      <label style="display:block;font-size:13px;font-weight:700;color:#14181F;margin-bottom:6px;">Registered mobile number</label>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <div style="border:1px solid #E2E5EA;border-radius:9px;padding:11px 12px;font-size:14px;color:#5B6472;">+91</div>
        <input type="text" placeholder="98765 43210" style="flex:1;border:1px solid #E2E5EA;border-radius:9px;padding:11px 12px;font-size:14px;font-family:inherit;box-sizing:border-box;" />
      </div>
      <button style="width:100%;border:1px solid #E2E5EA;background:#FFFFFF;border-radius:9px;padding:11px;font-size:14px;font-weight:700;color:#2451D6;cursor:pointer;margin-bottom:18px;">Send OTP</button>
    </sc-if>

    <button style="width:100%;border:none;background:#2451D6;color:#FFFFFF;border-radius:9px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;margin-bottom:18px;">{{ ctaLabel }}</button>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
      <div style="flex:1;height:1px;background:#E2E5EA;"></div><span style="font-size:12.5px;color:#8891A0;">or continue with</span><div style="flex:1;height:1px;background:#E2E5EA;"></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:22px;">
      <button style="display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid #E2E5EA;background:#FFFFFF;border-radius:9px;padding:11px;font-size:14px;font-weight:600;color:#14181F;cursor:pointer;">
        <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.67-2.26 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A10.99 10.99 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06L5.84 9.9C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
        Continue with Google
      </button>
      <button style="display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid #E2E5EA;background:#FFFFFF;border-radius:9px;padding:11px;font-size:14px;font-weight:600;color:#14181F;cursor:pointer;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="#0A66C2"><rect x="2" y="2" width="20" height="20" rx="3"/><path fill="#FFFFFF" d="M7.3 9.7h2.7v8.3H7.3zM8.65 8.4a1.55 1.55 0 1 1 0-3.1 1.55 1.55 0 0 1 0 3.1zM12.1 9.7h2.6v1.14c.37-.6 1.15-1.34 2.5-1.34 2.7 0 3.2 1.78 3.2 4.1v4.4h-2.7v-3.9c0-.93-.02-2.1-1.3-2.1-1.3 0-1.5 1-1.5 2.05v3.95h-2.8z"/></svg>
        Continue with LinkedIn
      </button>
    </div>

    <p style="text-align:center;font-size:13.5px;color:#5B6472;margin:0 0 10px;">New employer? <a href="#register-company" style="font-weight:700;text-decoration:none;">Register your company</a></p>
    <p style="text-align:center;font-size:13px;color:#8891A0;margin:0;">Looking for a job instead? <a href="#login" style="font-weight:600;text-decoration:none;">Candidate login</a></p>
  </div>
</div>

<dc-import name="Footer" hint-size="100%,360px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { mode: 'password' };
  setMode = (key) => this.setState({ mode: key });
  renderVals() {
    const isPassword = this.state.mode === 'password';
    return {
      isPassword,
      isOtp: !isPassword,
      setMode: this.setMode,
      ctaLabel: isPassword ? 'Log in' : 'Verify OTP & log in',
      modes: [
        { key: 'password', label: 'Password', bg: isPassword ? '#FFFFFF' : 'transparent', color: isPassword ? '#14181F' : '#5B6472' },
        { key: 'otp', label: 'OTP', bg: !isPassword ? '#FFFFFF' : 'transparent', color: !isPassword ? '#14181F' : '#5B6472' },
      ],
    };
  }
}

</script>
</body>
</html>
