spring.application.name=OpenOpportunity

spring.datasource.url=jdbc:postgresql://localhost:5432/openopportunity
spring.datasource.username=openopportunity
spring.datasource.password=openopportunity

# Flyway owns the schema; Hibernate only validates entities against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
# Actuator endpoints are served by a separate handler mapping from @RestControllers
# and don't go through the CorsConfigurationSource bean (see WebConfig) — they need
# their own CORS config to be reachable from the Vite dev server.
management.endpoints.web.cors.allowed-origins=${app.cors.allowed-origins}
management.endpoints.web.cors.allowed-methods=GET

app.cors.allowed-origins=http://localhost:5173

# Dev-only secret — override via APP_JWT_SECRET in any real deployment. Must be >= 32
# bytes (256 bits) for HS256.
app.jwt.secret=a403438eb69850b8afda1af1bc448e65849fe6331e3e6018b397aa8f73ccf4c1
app.jwt.access-token-expiry-minutes=15
app.jwt.refresh-token-expiry-days=30

# The refresh-token cookie's Secure flag — false so it still works over plain http on
# localhost; set true (or override via APP_SECURITY_COOKIE_SECURE) once served over TLS.
app.security.cookie-secure=false

# Local dev only — seeds one admin account on startup if it doesn't exist yet (see
# AdminSeeder; there's no admin self-registration flow by design). Override via
# APP_ADMIN_SEED_EMAIL / APP_ADMIN_SEED_PASSWORD in any real deployment.
app.admin.seed-email=admin@openopportunity.com
app.admin.seed-password=AdminPass123!
