spring.application.name=OpenOpportunity

# Cloud Run injects $PORT and expects the container to listen on it; SERVER_PORT isn't
# set there, so this has to be resolved from PORT explicitly. Defaults to 8080 locally.
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/openopportunity
spring.datasource.username=openopportunity
spring.datasource.password=openopportunity

# Flyway owns the schema; Hibernate only validates entities against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
# Actuator endpoints are served by a separate handler mapping from @RestControllers
# and don't go through the CorsConfigurationSource bean (see WebConfig) — they need
# their own CORS config to be reachable from the Vite dev server.
management.endpoints.web.cors.allowed-origins=${app.cors.allowed-origins}
management.endpoints.web.cors.allowed-methods=GET

app.cors.allowed-origins=http://localhost:5173

# Dev-only secret — override via APP_JWT_SECRET in any real deployment. Must be >= 32
# bytes (256 bits) for HS256.
app.jwt.secret=a403438eb69850b8afda1af1bc448e65849fe6331e3e6018b397aa8f73ccf4c1
app.jwt.access-token-expiry-minutes=15
app.jwt.refresh-token-expiry-days=30

# The refresh-token cookie's Secure flag — false so it still works over plain http on
# localhost; set true (or override via APP_SECURITY_COOKIE_SECURE) once served over TLS.
app.security.cookie-secure=false

# Lax works locally because localhost:5173 -> localhost:8080 counts as same-site
# (same host, different port). It does NOT work once frontend and backend are on
# genuinely different sites (e.g. a *.run.app backend + a separate frontend host) —
# a Lax cookie is simply never attached to a cross-site fetch/XHR call, so the
# refresh flow silently breaks. Override to None (which requires Secure=true, hence
# also flipping APP_SECURITY_COOKIE_SECURE) via APP_SECURITY_COOKIE_SAME_SITE in that
# deployment shape.
app.security.cookie-same-site=Lax

# Local dev only — seeds one admin account on startup if it doesn't exist yet (see
# AdminSeeder; there's no admin self-registration flow by design). Override via
# APP_ADMIN_SEED_EMAIL / APP_ADMIN_SEED_PASSWORD in any real deployment.
app.admin.seed-email=admin@openopportunity.com
app.admin.seed-password=AdminPass123!

# "Sign in with Google" (candidate-only, see GoogleTokenVerifierService) verifies the ID
# token audience against this OAuth 2.0 Client ID. Create one at
# https://console.cloud.google.com/apis/credentials (Application type: Web application;
# Authorized JavaScript origins: http://localhost:5173 and any deployed frontend origin).
# Blank locally disables the feature — GoogleTokenVerifierService throws instead of silently
# accepting tokens it can't actually verify.
app.oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:482829708882-v20vkkttvit8393qj0k849vd70k6l4a5.apps.googleusercontent.com}

# Local disk storage for uploaded files (resumes, ...) — see com.openopportunity.storage.
# GCS-backed storage is the natural next FileStorageService once a real deployment needs
# uploads to survive past a single container instance; local disk keeps dev self-contained
# per the local-first build philosophy. Override via STORAGE_ROOT_DIR in any real deployment.
app.storage.root-dir=${STORAGE_ROOT_DIR:uploads}
# 150MB accommodates mock interview recordings (see com.openopportunity.mockinterview); resumes
# still enforce their own tighter 5MB cap in CandidateProfileService.validate().
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB

# Outbound SMTP for CommunityInterestService (the Community page's "know more" button — see
# com.openopportunity.community). Blank MAIL_USERNAME/MAIL_PASSWORD locally means sends will
# fail with an auth error until real SMTP credentials are supplied via env vars — there's no
# local-first stand-in for an actual mail relay, unlike Postgres/file storage.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# The "from" address on outgoing notification emails, and the dedicated inbox that receives
# them. Override both via env vars in any real deployment; app.mail.from should be a verified
# sender for whichever SMTP provider MAIL_HOST points at.
app.mail.from=${APP_MAIL_FROM:no-reply@openopportunity.com}
app.community.contact-email=${APP_COMMUNITY_CONTACT_EMAIL:}

# Candidate billing checkout (see com.openopportunity.billing). Blank locally means
# CandidateBillingService.razorpayClient stays null — Free downgrade still works, paid-plan
# checkout fails gracefully with a 502 until real Razorpay test/live keys are supplied via env
# vars. key-id is also handed back to the frontend as-is (it's the publishable key); key-secret
# and webhook-secret never leave the backend.
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
